version: '3.8'

services:
  neo4j:
    image: neo4j:5.20.0
    container_name: evolith-neo4j
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/evolith_secret
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: evolith-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=evolith
      - POSTGRES_PASSWORD=evolith_secret
      - POSTGRES_DB=evolith
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: evolith-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  neo4j_data:
  postgres_data:
